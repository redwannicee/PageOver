; PageOver - PHP configuration override
; Placed in php/ directory so it applies to all scripts in this folder.
; This ensures PHP errors NEVER appear as HTML in JSON responses.

display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL

; Upload limits - increase if users have large projects
upload_max_filesize = 50M
post_max_size = 55M
max_execution_time = 120
max_input_time = 120
memory_limit = 256M
