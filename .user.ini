; PageOver — .user.ini
; PHP-FPM / CGI reads this automatically from the webroot.
; Ensures display_errors is OFF so PHP warnings never corrupt JSON responses.

display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL

upload_max_filesize = 50M
post_max_size = 55M
max_execution_time = 120
memory_limit = 256M
